<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOTHING — Tasks, Done</title>
  <meta name="description" content="Stop managing. Start doing. The simplest way to get things done on iPhone." />
  <meta name="apple-itunes-app" content="app-id=6761752907">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F0F0F0;
      --text: #000000;
      --footer-text: rgba(0, 0, 0, 0.38);
    }

    html { height: 100%; }

    body {
      height: 100%;
      background-color: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    body.dark {
      --bg: #000000;
      --text: #ffffff;
      --footer-text: rgba(255, 255, 255, 0.38);
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 500px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 clamp(1.5rem, 8vw, 9rem);
      max-width: 55%;
    }

    .headline {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .headline-small {
      font-family: 'Zalando Sans Expanded', sans-serif;
      font-weight: 400;
      font-size: clamp(1.5rem, 1.62vw + 0.675rem, 2.025rem);
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 1rem;
      transition: color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .headline-large {
      font-family: 'Zalando Sans Expanded', sans-serif;
      font-weight: 700;
      font-size: clamp(3rem, 6vw + 1.5rem, 11rem);
      letter-spacing: -0.035em;
      line-height: 0.88;
      color: var(--text);
      margin-bottom: 2rem;
      transition: color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .badge-link {
      display: inline-flex;
      width: fit-content;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .badge-link:hover  { opacity: 0.75; transform: translateY(-1px); }
    .badge-link:active { opacity: 0.5;  transform: translateY(0); }

    .badge-link img {
      height: clamp(64px, 4.5vh, 84px);
      width: auto;
      display: block;
    }

    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 clamp(1.5rem, 8vw, 9rem) clamp(1rem, 2.5vh, 2rem);
    }

    .footer a {
      font-family: 'Zalando Sans Expanded', sans-serif;
      font-size: clamp(0.75rem, 0.8vw + 0.3rem, 0.9rem);
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s ease;
    }

    .footer a:hover { color: var(--text); }

    .headline,
    .badge-link,
    .footer {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .headline   { animation-delay: 0.1s; }
    .badge-link { animation-delay: 0.22s; }
    .footer     { animation-delay: 0.3s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      .hero-bg {
        object-fit: cover;
        object-position: 70% top;
        inset: auto;
        top: 15%;
        left: -12.5%;
        width: 125%;
        height: 95%;
      }

      .hero-content {
        justify-content: flex-start;
        padding-top: clamp(3rem, 12vw, 5rem);
        padding-left: clamp(1.2rem, 5vw, 2rem);
        padding-right: clamp(1.2rem, 5vw, 2rem);
        max-width: 100%;
        gap: 0;
      }

      .headline-small {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      .headline-large {
        font-size: 5rem;
        margin-bottom: 1.5rem;
      }

      .badge-link img {
        height: 48px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, .headline, .badge-link, .footer {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="hero">

    <img
      id="hero-bg"
      class="hero-bg"
      src="hero-light.png"
      alt=""
      aria-hidden="true"
      fetchpriority="high"
    />

    <div class="hero-content">
      <div class="headline">
        <span class="headline-small">Stop managing.</span>
        <span class="headline-large">Start<br>doing.</span>
      </div>

      <a class="badge-link"
         href="https://apps.apple.com/app/dothing-tasks-done/id6761752907"
         target="_blank"
         rel="noopener"
         aria-label="Download DOTHING on the App Store">
        <img id="app-badge"
             src="badge-dark.svg"
             alt="Download on the App Store"
             width="135"
             height="45" />
      </a>
    </div>

    <footer class="footer">
      <a href="https://premgurusamy.github.io/dothing/"
         target="_blank"
         rel="noopener">Terms &amp; Privacy</a>
      <a href="mailto:herepremg@gmail.com">Get Support</a>
    </footer>

  </div>

  <script>
    (function () {
      var badge = document.getElementById('app-badge');
      var hero  = document.getElementById('hero-bg');
      var dark  = window.matchMedia('(prefers-color-scheme: dark)');

      function update() {
        var isDark = dark.matches;
        hero.style.opacity = '0';
        setTimeout(function () {
          hero.src = isDark ? 'hero-dark.png' : 'hero-light.png';
          hero.onload = function () { hero.style.opacity = '1'; };
        }, 300);
        badge.src = isDark ? 'badge-light.svg' : 'badge-dark.svg';
        document.body.classList.toggle('dark', isDark);
      }

      update();
      dark.addEventListener('change', update);
    })();
  </script>

</body>
</html>
